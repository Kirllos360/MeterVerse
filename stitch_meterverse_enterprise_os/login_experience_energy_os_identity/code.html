<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Energy OS Enterprise</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-dim": "#1c1c1c",
                  "on-error-container": "#93000a",
                  "info-cyan": "#06B6D4",
                  "neutral-gray-surface": "#F9FAFB",

                  "utility-lime": "#AACE38",

                  "tertiary-fixed": "#ffdcc3",

                  "surface-container": "#1a1c14",
                  "on-surface": "#f0f2ea",

                  "on-primary": "#ffffff",
                  "surface-variant": "#2a2c24",
                  "inverse-primary": "#bfc5e4",

                  "secondary-fixed-dim": "#adc6ff",
                  "on-background": "#f0f2ea",
                  "monitoring-purple": "#8B5CF6",
                  "on-tertiary": "#ffffff",
                  "surface": "#12140e",
                  "on-secondary-fixed": "#001a42",
                  "error-red": "#EF4444",

                  "success-emerald": "#10B981",
                  "on-secondary": "#ffffff",

                  "error": "#ba1a1a",
                  "secondary": "#10B981",
                  "surface-bright": "#fcf8fb",

                  "on-secondary-fixed-variant": "#004395",

                  "on-secondary-container": "#ecfdf5"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"

          "spacing": {

                  "grid-margin": "24px"

          "fontFamily": {

                  "label-sm": ["JetBrains Mono"],
                  "headline-lg-mobile": ["Hanken Grotesk"],

                  "display-lg": ["Hanken Grotesk"],
                  "body-md": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    @keyframes premium-pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .hover-pulse:hover {
      animation: premium-pulse 1.5s infinite;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
      background: rgba(26, 28, 20, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .grid-overlay {
      background-image: radial-gradient(circle, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-primary-container text-on-primary-container min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/80"></div>
<div class="absolute inset-0 grid-overlay"></div>
</div>
<!-- Content Layer -->
<main class="relative z-10 flex-grow flex items-center justify-center px-gutter">
<div class="w-full max-w-[440px] transition-all duration-500 ease-out transform">
<!-- Login Card -->
<div class="glass-panel rounded-xl p-8 shadow-2xl flex flex-col gap-6" style="transform: rotateY(-14.0667deg) rotateX(8.31111deg);">
<!-- Brand Identity -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="w-16 h-16 bg-success-emerald/10 rounded-lg flex items-center justify-center overflow-hidden border border-success-emerald/20">
<svg class="w-10 h-10 text-success-emerald" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Energy OS</h1>
<p class="font-label-md text-label-md text-on-primary-container opacity-80 uppercase tracking-widest mt-1">Enterprise v3.1 Terminal</p>
</div>
</div>
<!-- Auth Form -->
<form class="flex flex-col gap-5 mt-4" onsubmit="return false;">
<!-- Enterprise ID -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-primary-container/90 ml-1" for="enterprise_id">Enterprise ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">domain</span>
<input class="w-full bg-black/40 border border-outline-variant/50 rounded-lg pl-10 pr-4 py-3 text-on-surface font-body-md focus:ring-2 focus:ring-success-emerald focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="enterprise_id" placeholder="EN-SYS-0000" type="text"/>
</div>
</div>
<!-- Username -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-primary-container/90 ml-1" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">account_circle</span>
<input class="w-full bg-black/40 border border-outline-variant/50 rounded-lg pl-10 pr-4 py-3 text-on-surface font-body-md focus:ring-2 focus:ring-success-emerald focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="username" placeholder="grid_operator" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-primary-container/90" for="password">Password</label>
<a class="font-label-sm text-label-sm text-success-emerald hover:text-utility-lime transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">lock</span>
<input class="w-full bg-black/40 border border-outline-variant/50 rounded-lg pl-10 pr-12 py-3 text-on-surface font-body-md focus:ring-2 focus:ring-success-emerald focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center gap-2 mt-2">
<input class="w-4 h-4 rounded border-outline-variant/50 bg-black/40 text-success-emerald focus:ring-success-emerald cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-primary-container/70 cursor-pointer select-none" for="remember">Remember this terminal session</label>
</div>
<button class="hover-pulse w-full bg-success-emerald text-primary-container py-3.5 rounded-lg font-headline-md text-body-md font-bold tracking-wide transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] mt-2 flex items-center justify-center gap-2">
            Sign In to Energy OS
            <span class="material-symbols-outlined text-[18px]">bolt</span>
</button>
</form>
<!-- SSO Separator -->
<div class="flex items-center gap-4 my-2">
<div class="h-[1px] flex-grow bg-on-primary-container/10"></div>
<span class="font-label-sm text-label-sm text-on-primary-container/40 uppercase tracking-tighter">or authorize via</span>
<div class="h-[1px] flex-grow bg-on-primary-container/10"></div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 bg-on-primary-container/5 hover:bg-on-primary-container/10 border border-white/5 py-2.5 rounded-lg transition-all font-body-sm text-body-sm text-on-primary-container">
<span class="material-symbols-outlined text-[18px]">key</span>
            Azure AD
          </button>
<button class="flex items-center justify-center gap-2 bg-on-primary-container/5 hover:bg-on-primary-container/10 border border-white/5 py-2.5 rounded-lg transition-all font-body-sm text-body-sm text-on-primary-container">
<span class="material-symbols-outlined text-[18px]">shield_with_house</span>
            Okta
          </button>
</div>
</div>
<!-- Helper Links -->
<div class="mt-8 flex justify-between px-4">
<div class="flex gap-4">
<a class="font-label-sm text-label-sm text-on-primary-container/50 hover:text-on-surface transition-colors" href="#">Grid Status: <span class="text-success-emerald">Stable</span></a>
</div>
<div class="flex gap-4">
<a class="font-label-sm text-label-sm text-on-primary-container/50 hover:text-on-surface transition-colors" href="#">Terms</a>
<a class="font-label-sm text-label-sm text-on-primary-container/50 hover:text-on-surface transition-colors" href="#">Infrastructure Support</a>
</div>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="relative z-10 flex flex-col md:flex-row justify-between items-center w-full px-grid-margin h-12 border-t border-outline-variant/10 bg-primary-container/80 backdrop-blur-sm">
<div class="font-body-sm text-body-sm text-on-primary-container/50">
      © 2024 Energy OS Infrastructure. All Systems Operational.
    </div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 font-label-sm text-label-sm text-success-emerald">
<span class="material-symbols-outlined text-[14px]">encrypted</span>
        FIPS 140-2 COMPLIANT
      </div>
<div class="flex items-center gap-2 font-label-sm text-label-sm text-on-primary-container/50">
<span class="material-symbols-outlined text-[14px]">public</span>
        REGION: SUSTAINABLE-01
      </div>
</div>
</footer>
<!-- Micro-Interactions Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.querySelector('span')?.classList.add('text-success-emerald');
        });
        input.addEventListener('blur', () => {
          input.parentElement.querySelector('span')?.classList.remove('text-success-emerald');
        });
      });

      // Atmospheric mouse movement effect on the glass card
      const card = document.querySelector('.glass-panel');
      document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 45;
        const y = (window.innerHeight / 2 - e.pageY) / 45;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    });
  </script>
</body></html>
