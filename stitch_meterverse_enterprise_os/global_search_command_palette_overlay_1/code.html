<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('keydown', function(e) {
            // Close on Escape
            if (e.key === 'Escape') {
                const backdrop = document.getElementById('command-backdrop');
                backdrop.style.opacity = '0';
                backdrop.style.transition = 'opacity 0.2s ease-out';
                setTimeout(() => backdrop.style.display = 'none', 200);
            }
            
            // Cmd+K Placeholder logic (for demo visually present)
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                const backdrop = document.getElementById('command-backdrop');
                backdrop.style.display = 'flex';
                backdrop.style.opacity = '1';
                document.querySelector('input').focus();
            }
        });

        // Close when clicking outside modal
        document.getElementById('command-backdrop').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.opacity = '0';
                this.style.transition = 'opacity 0.2s ease-out';
                setTimeout(() => this.style.display = 'none', 200);
            }
        });

        // Hover scale effect for buttons
        const items = document.querySelectorAll('.command-item');
        items.forEach(item => {
            item.addEventListener('mousedown', () => {
                item.style.transform = 'scale(0.98)';
            });
            item.addEventListener('mouseup', () => {
                item.style.transform = 'translateX(4px) scale(1)';
            });
        });
    </script>
