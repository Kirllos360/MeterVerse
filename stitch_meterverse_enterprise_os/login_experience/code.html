</div>
</div>
<!-- Auth Form -->
<form class="flex flex-col gap-5 mt-4" onsubmit="return false;">
<!-- Enterprise ID -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-primary-container/90 ml-1" for="enterprise_id">Enterprise ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">domain</span>
<input class="w-full bg-black/30 border border-outline-variant/30 rounded-lg pl-10 pr-4 py-3 text-on-primary font-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="enterprise_id" placeholder="MV-ENT-0000" type="text">
</div>
</div>
<!-- Username -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-primary-container/90 ml-1" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">account_circle</span>
<input class="w-full bg-black/30 border border-outline-variant/30 rounded-lg pl-10 pr-4 py-3 text-on-primary font-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="username" placeholder="operator_id" type="text">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-primary-container/90" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-secondary-fixed transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 text-[20px]">lock</span>
<input class="w-full bg-black/30 border border-outline-variant/30 rounded-lg pl-10 pr-12 py-3 text-on-primary font-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none placeholder:text-on-primary-container/30" id="password" placeholder="••••••••" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-primary-container/50 hover:text-on-primary transition-colors" type="button">

</div>
</div>
<!-- Actions -->

<label class="font-body-sm text-body-sm text-on-primary-container/70 cursor-pointer select-none" for="remember">Remember this terminal session</label>
</div>
<button class="hover-pulse w-full bg-secondary text-on-secondary py-3.5 rounded-lg font-headline-md text-body-md font-bold tracking-wide transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] mt-2 flex items-center justify-center gap-2">

<div class="flex items-center gap-2 font-label-sm text-label-sm text-on-primary-container/50">
<span class="material-symbols-outlined text-[14px]">public</span>

</div>
</footer>
<!-- Micro-Interactions Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.querySelector('span')?.classList.add('text-secondary');
        });
        input.addEventListener('blur', () => {
          input.parentElement.querySelector('span')?.classList.remove('text-secondary');
        });
      });

      // Atmospheric mouse movement effect on the glass card
      const card = document.querySelector('.glass-panel');
      document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 45;
        const y = (window.innerHeight / 2 - e.pageY) / 45;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    });
  </script>
