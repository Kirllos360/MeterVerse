version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meter_verse_reporting
      POSTGRES_USER: meter_verse
      POSTGRES_PASSWORD: meter_verse_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter_verse -d meter_verse_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5

  reporting-engine:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: meter_verse_reporting
      DB_USER: meter_verse
      DB_PASSWORD: meter_verse_dev
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PDF_OWNER_PASSWORD: ${PDF_OWNER_PASSWORD:-changeit}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:+UseZGC -XX:MaxGCPauseMillis=50"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - compiled_reports:/app/compiled
      - template_storage:/root/.meterverse/templates
      - ./fonts:/app/fonts:ro
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
  compiled_reports:
  template_storage:
