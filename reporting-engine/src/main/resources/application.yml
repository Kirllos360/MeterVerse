server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: meterverse-reporting-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meter_verse_reporting}
    username: ${DB_USER:meter_verse}
    password: ${DB_PASSWORD:meter_verse_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: ReportingEnginePool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        prefetch: 10
        concurrency: 5
        max-concurrency: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JasperReports Configuration
jasper:
  compiler:
    temp-directory: ${java.io.tmpdir}/jasper-compiled
    keep-java-file: false
  export:
    pdf:
      compressed: true
      encrypted: false
      permissions: COPY|PRINT|MODIFY
      font-name: "DejaVu Sans"
      font-size: 7
      arabic:
        enabled: true
        renderer: icu4j
    excel:
      detect-cell-type: true
      remove-empty-space-between-columns: true
      one-page-per-sheet: false
    html:
      embedded-images: true
      css: classpath:reports/common/style.css
  cache:
    compiled-reports: true
    max-cache-size: 500
    resources:
      max-age-seconds: 3600
  subreport:
    prefix: classpath:subreports/
  fonts:
    path: classpath:fonts/
    extensions: true

# JXLS Configuration
jxls:
  template-path: classpath:templates/
  output-path: ${java.io.tmpdir}/jxls-output/
  image-path: classpath:images/

# Template Manager
template:
  storage:
    path: ${TEMPLATE_STORAGE:${user.home}/.meterverse/templates}
    max-versions: 50
  git:
    enabled: false
    remote: ""
    branch: main

# PDF Security
pdf:
  security:
    owner-password: ${PDF_OWNER_PASSWORD:changeit}
    default-permissions: PRINT|COPY|MODIFY
    keystore:
      path: ${PDF_KEYSTORE_PATH:/etc/meterverse/keystore.p12}
      password: ${PDF_KEYSTORE_PASSWORD:changeit}
      alias: meterverse-ca

# Bulk Generation
bulk:
  queue:
    name: report-generation
    max-retries: 3
    retry-delay-ms: 5000
  streaming:
    chunk-size: 1000
    flush-interval-ms: 100
  threads:
    min: 4
    max: 32

# Performance
performance:
  connection-pool:
    max-size: 50
  thread-pool:
    core: 10
    max: 50
    queue-capacity: 1000
  cache:
    reports:
      maximum-size: 500
      expire-after-write: 30m
    templates:
      maximum-size: 200
      expire-after-write: 60m
    images:
      maximum-size: 100
      expire-after-write: 120m
    fonts:
      maximum-size: 50
      expire-after-write: 120m

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  metrics:
    tags:
      application: ${spring.application.name}
  cache:
    stat: true

logging:
  level:
    com.meterverse: DEBUG
    net.sf.jasperreports: INFO
    org.jxls: INFO
    org.springframework: WARN
    com.zaxxer.hikari: INFO
  file:
    path: ${LOG_PATH:${java.io.tmpdir}/meterverse-logs}
    max-size: 100MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
