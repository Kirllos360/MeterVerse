      - article [ref=f2e46]:
        - generic [ref=f2e48]:
          - heading "What Are Cookies" [level=2] [ref=f2e49]
          - paragraph [ref=f2e50]: Cookies are small text files that are stored on your device when you visit a website. They help the website remember your preferences and understand how you interact with the site.
          - heading "How We Use Cookies" [level=2] [ref=f2e51]
          - paragraph [ref=f2e52]: "epower uses cookies to:"
          - list [ref=f2e53]:
            - listitem [ref=f2e54]: Ensure the website functions properly
            - listitem [ref=f2e55]: Remember your preferences and settings
            - listitem [ref=f2e56]: Analyze site traffic and usage patterns
            - listitem [ref=f2e57]: Improve our services and user experience
            - listitem [ref=f2e58]: Provide personalized content and recommendations
          - heading "Types of Cookies We Use" [level=2] [ref=f2e59]
          - heading "Essential Cookies" [level=3] [ref=f2e60]
          - paragraph [ref=f2e61]: These cookies are necessary for the website to function properly. They enable core functionality such as security, network management, and accessibility.
          - heading "Performance Cookies" [level=3] [ref=f2e62]
          - paragraph [ref=f2e63]: These cookies collect information about how visitors use our website, including which pages are visited most often. This helps us improve website performance.
          - heading "Functionality Cookies" [level=3] [ref=f2e64]
          - paragraph [ref=f2e65]: These cookies allow the website to remember choices you make (such as your language preference) and provide enhanced, personalized features.
          - heading "Analytics Cookies" [level=3] [ref=f2e66]
          - paragraph [ref=f2e67]: We use analytics cookies (such as Google Analytics) to understand how visitors interact with our website. This information is used to compile reports and improve our site.
          - heading "Marketing Cookies" [level=3] [ref=f2e68]
          - paragraph [ref=f2e69]: These cookies track your online activity to help advertisers deliver more relevant advertising or to limit how many times you see an ad.
          - heading "Third-Party Cookies" [level=2] [ref=f2e70]
          - paragraph [ref=f2e71]: "Some cookies are placed by third-party services that appear on our pages, including:"
          - list [ref=f2e72]:
            - listitem [ref=f2e73]: Google Analytics for website analytics
            - listitem [ref=f2e74]: Social media platforms for sharing functionality
            - listitem [ref=f2e75]: Payment processors for secure transactions
          - heading "Managing Cookies" [level=2] [ref=f2e76]
          - paragraph [ref=f2e77]: "You can control and manage cookies in several ways:"
          - heading "Browser Settings" [level=3] [ref=f2e78]
          - paragraph [ref=f2e79]: Most browsers allow you to refuse or accept cookies, delete existing cookies, and set preferences for certain websites. Check your browser's help section for instructions.
          - heading "Opt-Out Options" [level=3] [ref=f2e80]
          - paragraph [ref=f2e81]: "For analytics cookies, you can opt out using:"
          - list [ref=f2e82]:
            - listitem [ref=f2e83]: Google Analytics Opt-out Browser Add-on
            - listitem [ref=f2e84]: Your browser's "Do Not Track" feature
          - heading "Impact of Disabling Cookies" [level=2] [ref=f2e85]
          - paragraph [ref=f2e86]: "If you disable cookies, some features of our website may not function properly, including:"
          - list [ref=f2e87]:
            - listitem [ref=f2e88]: Remembering your login status
            - listitem [ref=f2e89]: Saving your preferences
            - listitem [ref=f2e90]: Personalized content and recommendations
          - heading "Cookie Retention" [level=2] [ref=f2e91]
          - paragraph [ref=f2e92]: "Cookies are retained for different periods depending on their purpose:"
          - list [ref=f2e93]:
            - listitem [ref=f2e94]: "Session cookies: Deleted when you close your browser"
            - listitem [ref=f2e95]: "Persistent cookies: Remain until they expire or you delete them"
            - listitem [ref=f2e96]: "Analytics cookies: Typically retained for up to 2 years"
          - heading "Updates to This Policy" [level=2] [ref=f2e97]
          - paragraph [ref=f2e98]: We may update this Cookie Policy to reflect changes in our practices or for operational, legal, or regulatory reasons.
          - heading "Contact Us" [level=2] [ref=f2e99]
          - paragraph [ref=f2e100]: "If you have questions about our use of cookies, please contact us at:"
          - paragraph [ref=f2e101]:
            - text: "Email: privacy@e-power.com"
            - text: "Phone: +20 2 1234 5678"
          - paragraph [ref=f2e102]:
            - strong [ref=f2e103]: "Last Updated:"
            - text: January 2026
