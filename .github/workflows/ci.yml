name: CI — Tests & Quality

on:
  push:
    branches: [clean-main]
  pull_request:
    branches: [clean-main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: meterverse_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/meterverse_test

      - name: Run unit tests
        run: npm test
        working-directory: backend

      - name: Run coverage
        run: npm run test:coverage
        working-directory: backend

      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Lint
        run: npm run lint
        working-directory: backend
        continue-on-error: true

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Frontend
      - name: Build
        run: npm run build
        working-directory: Frontend

  graphiti-validate:
    name: Graphiti Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install graphify
        run: pip install graphifyy -q
      - name: Validate manifest
        run: |
          python -c "
          import json
          with open('graphify-out/manifest.json') as f:
            m = json.load(f)
          paths = list(m.keys())[:5]
          print(f'Graph manifest: {len(m)} entries')
          print(f'Sample paths: {paths}')
          bad = [p for p in m if 'Meter-' in p]
          if bad:
            print(f'WARNING: {len(bad)} entries still have wrong path prefix')
          else:
            print('All paths verified correct')
          "
