name: MeterVerse CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test || true
      - run: echo "Backend dependencies installed"

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test || true
      - run: echo "Frontend build complete"

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit on backend
        working-directory: backend
        run: npm audit --audit-level=high || true
      - name: Run npm audit on frontend
        working-directory: Frontend
        run: npm audit --audit-level=high || true
      - name: Check for .env exposure
        run: |
          if git log --all --diff-filter=A --name-only --format='' | grep -i '\.env'; then
            echo "⚠ WARNING: .env files found in git history"
          else
            echo "✅ No .env files in git history"
          fi

  docker-build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t meterverse-backend -f Dockerfile.backend .
      - name: Build frontend Docker image
        run: docker build -t meterverse-frontend -f Frontend/Dockerfile .
