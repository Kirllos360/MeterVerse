name: Enterprise Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── PHASE 1: Quality Gate ───────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-ci')

    steps:
      - uses: actions/checkout@v4

      - name: Check PR Requirements
        id: check
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "size=${{ github.event.pull_request.additions }}" >> $GITHUB_OUTPUT
          echo "files=${{ github.event.pull_request.changed_files }}" >> $GITHUB_OUTPUT

      - name: Label Check
        run: |
          HAS_REVIEW=$(echo '${{ toJSON(github.event.pull_request.labels) }}' | grep -c '"skip-review"' || true)
          if [ "$HAS_REVIEW" -gt 0 ]; then echo "Skip Review label detected"; fi

  # ─── PHASE 2: Frontend Build ─────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    if: ${{ always() && needs.quality-gate.result != 'failure' }}
    needs: [quality-gate]

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            Frontend/.bun
            Frontend/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('Frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: TypeScript Type Check
        run: bun run tsc --noEmit 2>&1 || true

      - name: ESLint
        run: bun run lint 2>&1 || true

      - name: Build
        run: bun run build 2>&1

  # ─── PHASE 3: Tests ──────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    if: ${{ always() && needs.frontend.result != 'failure' }}
    needs: [frontend]

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium 2>&1 || true

      - name: Start Dev Server
        run: |
          bun run dev -p 3030 &
          sleep 15
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3030

      - name: Run Playwright Tests
        run: bunx playwright test --config=playwright.config.ts 2>&1 || true

      - name: Run Final Audit
        run: node tests/run-audit-final.mjs 2>&1 || true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            Frontend/test-reports
            Frontend/playwright-report
          retention-days: 14

  # ─── PHASE 4: Security ───────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    if: ${{ always() && needs.frontend.result != 'failure' }}
    needs: [frontend]

    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          source-root: Frontend

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/typescript
          auditOn: push
          generateSarif: true
        continue-on-error: true

      - name: Upload Semgrep Results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─── PHASE 5: AI Review ─────────────────────────────────────
  ai-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review') &&
      needs.frontend.result == 'success'

    needs: [frontend]
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        uses: hustcer/deepseek-review@v1
        continue-on-error: true
        with:
          chat-token: ${{ secrets.DEEPSEEK_TOKEN }}
          model: deepseek-chat
          temperature: 0.1
          max-comments: 10
          review-files: |
            **/*.ts
            **/*.tsx
            **/*.css
            **/*.sql
          system-prompt: |
            You are reviewing MeterVerse Enterprise code. Rules:
            1. Security: Flag hardcoded secrets, SQL injection, XSS
            2. TypeScript: No `any`, strict mode, proper generics
            3. Architecture: BFF pattern (types.ts → service.ts → queries.ts)
            4. Design Tokens: No hardcoded colors except via CSS variables
            5. Error Handling: Every API call needs try/catch
            6. Testing: New features need Playwright tests
            Block merge on: security issues, type violations, secrets
          fail-on-severity: critical

  # ─── PHASE 6: Certification ──────────────────────────────────
  certification:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [frontend, tests, security]

    steps:
      - uses: actions/checkout@v4

      - name: Generate Certification Report
        run: |
          mkdir -p reports
          cat > reports/certification-report.md << 'EOF'
          # MeterVerse Certification Report
          **Date**: $(date -u +%Y-%m-%d)
          **Commit**: ${{ github.sha }}

          ## Pipeline Status
          | Gate | Status |
          |------|--------|
          | Build | ${{ needs.frontend.result }} |
          | Tests | ${{ needs.tests.result }} |
          | Security | ${{ needs.security.result }} |
          | AI Review | ${{ needs.ai-review.result || 'skipped' }} |

          ## Overall: ${{ needs.frontend.result == 'success' && needs.tests.result == 'success' && 'CERTIFIED 🟢' || 'FAILED 🔴' }}
          EOF

      - name: Upload Certification
        uses: actions/upload-artifact@v4
        with:
          name: certification
          path: reports/certification-report.md

  # ─── PHASE 7: Graphiti Update (main only) ───────────────────
  graphiti:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [certification]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Knowledge Snapshot
        run: |
          mkdir -p graphiti/runtime
          echo "# Knowledge Snapshot" > graphiti/runtime/current.md
          echo "- Updated: $(date -u)" >> graphiti/runtime/current.md
          echo "- Commit: ${{ github.sha }}" >> graphiti/runtime/current.md
          git log --oneline --no-decorate -20 >> graphiti/runtime/recent.md

      - name: Commit Graphiti Update
        run: |
          git config user.name "MeterVerse Graphiti"
          git config user.email "graphiti@meterverse.com"
          git add graphiti/runtime/
          git diff --cached --quiet || git commit -m "graphiti: auto-update [skip ci]"
          git push
