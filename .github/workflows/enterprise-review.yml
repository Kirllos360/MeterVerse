name: Enterprise AI Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: 1. Install Dependencies
        run: bun install

      - name: 2. TypeScript Check
        id: tsc
        continue-on-error: true
        run: bun run tsc --noEmit 2>&1 | tee ../docs/reviews/tsc-report.txt

      - name: 3. Lint Check
        id: lint
        continue-on-error: true
        run: bun run lint 2>&1 | tee ../docs/reviews/lint-report.txt

      - name: 4. Build
        id: build
        run: bun run build 2>&1

      - name: 5. Unit Tests
        id: unit-tests
        continue-on-error: true
        run: bun test 2>&1 | tee ../docs/reviews/unit-test-report.txt

      - name: 6. Playwright Tests
        id: playwright
        continue-on-error: true
        run: |
          bunx playwright install chromium 2>&1
          bun run dev -p 3030 &
          sleep 15
          bunx playwright test --config=playwright.config.ts 2>&1 | tee ../docs/reviews/playwright-report.txt

      - name: 7. Capture Screenshots
        id: screenshots
        continue-on-error: true
        run: node tests/screenshots.mjs 2>&1 | tee ../docs/reviews/screenshot-report.txt

      - name: 8. Visual Regression
        id: visual-regression
        continue-on-error: true
        run: node tests/visual-regression.mjs compare 2>&1 | tee ../docs/reviews/visual-regression-report.txt

      - name: 9. Final Audit
        id: audit
        continue-on-error: true
        run: node tests/run-audit-final.mjs 2>&1 | tee ../docs/reviews/audit-report.txt

      - name: 10. Enterprise AI Review
        id: enterprise-review
        continue-on-error: true
        run: node ../scripts/review/enterprise-review.mjs 2>&1

      - name: Generate PR Summary
        id: summary
        run: |
          echo "## 🤖 Enterprise AI Review Complete" > ../docs/reviews/pr-summary.md
          echo "" >> ../docs/reviews/pr-summary.md
          echo "| Check | Status |" >> ../docs/reviews/pr-summary.md
          echo "|-------|--------|" >> ../docs/reviews/pr-summary.md
          echo "| ✅ TypeScript | ${{ steps.tsc.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Lint | ${{ steps.lint.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Build | ${{ steps.build.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Unit Tests | ${{ steps.unit-tests.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Playwright | ${{ steps.playwright.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Screenshots | ${{ steps.screenshots.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Visual Regression | ${{ steps.visual-regression.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "| ✅ Final Audit | ${{ steps.audit.outcome }}" >> ../docs/reviews/pr-summary.md
          echo "" >> ../docs/reviews/pr-summary.md
          echo "### 📊 Enterprise Review Scores" >> ../docs/reviews/pr-summary.md
          grep "Score:" ../docs/reviews/review-*.md >> ../docs/reviews/pr-summary.md 2>/dev/null || true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('docs/reviews/pr-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Upload All Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-review-reports
          path: |
            docs/reviews/
            docs/VISUAL_REGRESSION_REPORT.md
            docs/screenshots/diff/
          retention-days: 14
