name: Deploy — Production

on:
  workflow_run:
    workflows: ["CI - Tests and Quality"]
    types: [completed]
    branches: [clean-main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure deployment
        run: |
          echo "Deployment ready for: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"

      - name: Build backend
        run: |
          cd backend
          npm ci
          npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy backend
        run: |
          echo "Backend ready for deployment"
          echo "Next: Set DATABASE_URL, JWT_SECRET, SMTP_* in production"
          echo "Deploy target: node src/server.js"
        working-directory: backend

      - name: Build frontend
        run: |
          cd Frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Deploy frontend
        run: |
          echo "Frontend ready for deployment"
          echo "Next: Set Clerk keys, deploy to Vercel or Docker"
          echo "Deploy target: npm run start"
        working-directory: Frontend
